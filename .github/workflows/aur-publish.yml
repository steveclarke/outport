name: Publish AUR Package

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions: {}

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh jq

      - name: Get release tag
        id: release
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/steveclarke/outport/releases/latest | jq -r .tag_name)
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/steveclarke/outport/releases/download/${{ steps.release.outputs.tag }}/checksums.txt" -o checksums.txt

      - name: Extract SHA256 sums
        id: checksums
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA256_AMD64=$(grep "outport_${VERSION}_linux_amd64.tar.gz" checksums.txt | awk '{print $1}')
          SHA256_ARM64=$(grep "outport_${VERSION}_linux_arm64.tar.gz" checksums.txt | awk '{print $1}')
          if [[ -z "$SHA256_AMD64" || -z "$SHA256_ARM64" ]]; then
            echo "::error::Failed to extract checksums from checksums.txt"
            exit 1
          fi
          echo "sha256_amd64=${SHA256_AMD64}" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=${SHA256_ARM64}" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD
        run: |
          sed \
            -e "s/{{VERSION}}/${{ steps.release.outputs.version }}/" \
            -e "s/{{SHA256_AMD64}}/${{ steps.checksums.outputs.sha256_amd64 }}/" \
            -e "s/{{SHA256_ARM64}}/${{ steps.checksums.outputs.sha256_arm64 }}/" \
            packaging/aur/PKGBUILD.template > PKGBUILD

      - name: Generate .SRCINFO
        run: |
          useradd -m builder
          cp PKGBUILD /home/builder/
          chown builder:builder /home/builder/PKGBUILD
          su builder -c "cd ~ && makepkg --printsrcinfo" > .SRCINFO

      - name: Push to AUR
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur"
          git clone ssh://aur@aur.archlinux.org/outport-bin.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "Steve Clarke"
          git config user.email "1305+steveclarke@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to v${{ steps.release.outputs.version }}"
          git push
